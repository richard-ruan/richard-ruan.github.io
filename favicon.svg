<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Transparent background -->
  <rect width="100" height="100" fill="none"/>
  <!-- Deep navy circle -->
  <circle cx="50" cy="50" r="50" fill="#0F1F3D"/>
  <!-- Baby blue R centered in the circle, using a clean serif-style capital R -->
  <text
    x="50"
    y="46"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62"
    font-weight="bold"
    fill="#93C5FD"
  >R</text>
</svg>